# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
name: Release

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.0.0.

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.2.0
        with:
          # go.mod requires >=1.26.5 (Grafana's own govulncheck flagged 1.26.4 for GO-2026-5856 /
          # GO-2026-4970, stdlib CVEs in the toolchain itself) - the action's default (1.25) is
          # too old and GOTOOLCHAIN=local on the runner won't auto-upgrade.
          go-version: '1.26.5'
          # Lets reviewers verify the release was actually built by this repo's CI, not hand-
          # assembled - addresses the validator's "no-provenance-attestation" tip.
          attestation: true
          # Uncomment once this plugin has been approved and Grafana has granted a signing
          # level - see https://grafana.com/developers/plugin-tools/publish-a-plugin/sign-a-plugin#generate-an-access-policy-token
          # Make sure to save the token in your repository secrets first.
          #policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
